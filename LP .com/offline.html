<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e4aff" />
  <title>لا يوجد اتصال — Laptop Duhok</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef1f8, #f4f6fb);
      color: #141722;
      text-align: center;
      line-height: 1.5;
    }
    .box { max-width: 22rem; }
    h1 { font-size: 1.2rem; font-weight: 800; margin: 0 0 0.5rem; }
    p { margin: 0 0 1.25rem; color: #5a6172; font-size: 0.95rem; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      background: #0e4aff;
      color: #fff !important;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تحقق من الشبكة ثم أعد المحاولة. يمكنك العودة للصفحة الرئيسية عند عودة الاتصال.</p>
    <a href="index.html">الصفحة الرئيسية</a>
  </div>
</body>
</html>
